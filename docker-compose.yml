version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: riffle
      POSTGRES_PASSWORD: riffle
      POSTGRES_DB: riffle
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./pipeline/sql/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "riffle"]
      interval: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    command: >
      sh -c "pip install psycopg2-binary -q &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://riffle:riffle@postgres:5432/riffle
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://riffle:riffle@postgres:5432/riffle
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  prefect-worker:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://riffle:riffle@postgres:5432/riffle
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREFECT_API_URL: ${PREFECT_API_URL:-}
      PREFECT_API_KEY: ${PREFECT_API_KEY:-}
      USGS_API_KEY: ${USGS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  mlflow-artifacts:
