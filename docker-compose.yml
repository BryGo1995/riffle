services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: riffle
      POSTGRES_PASSWORD: riffle
      POSTGRES_DB: riffle
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./pipeline/sql/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "riffle"]
      interval: 5s
      retries: 5
    networks:
      default:
        aliases:
          - riffle-postgres

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    restart: unless-stopped
    # --allowed-hosts '*' disables DNS rebinding protection. Acceptable for
    # local dev on a closed box; MUST be tightened (or put MLflow behind an
    # auth proxy) before Railway exposure. See issue #5.
    command: >
      sh -c "pip install psycopg2-binary -q &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://riffle:riffle@postgres:5432/riffle
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  api:
    restart: unless-stopped
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://riffle:riffle@postgres:5432/riffle
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_HOME: /root/.prefect
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      default:
        aliases:
          - prefect-server

  prefect-serve:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python serve.py
    environment:
      DATABASE_URL: postgresql+psycopg2://riffle:riffle@postgres:5432/riffle
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      USGS_API_KEY: ${USGS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
      mlflow:
        condition: service_started

volumes:
  postgres-data:
  mlflow-artifacts:
  prefect-data:
